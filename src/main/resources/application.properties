server.port=8080
DEEPSEEK_API_KEY=sk-485faaf662294491a73089dd9d6ba9eb

# ========== Vector Store ==========
# Options: in-memory | chroma | milvus
vector.store.type=milvus

# InMemory — no additional config needed

# Chroma (used when vector.store.type=chroma)
chroma.host=localhost
chroma.port=8000
chroma.collection-name=rag_demo

# Milvus (used when vector.store.type=milvus)
milvus.host=localhost
milvus.port=19530
milvus.collection-name=rag_demo
milvus.dimension=2048

# ========== DeepSeek ==========
langchain4j.open-ai.chat-model.api-key=${DEEPSEEK_API_KEY}
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
langchain4j.open-ai.chat-model.model-name=deepseek-chat
langchain4j.open-ai.chat-model.temperature=0.7

langchain4j.open-ai.embedding-model.api-key=${DEEPSEEK_API_KEY}
langchain4j.open-ai.embedding-model.base-url=https://api.deepseek.com
langchain4j.open-ai.embedding-model.model-name=deepseek-embedding

# ========== Document ==========
app.document-scan-path=data/docs
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
