# ===================================================================
#  RAG Demo - Application Configuration
# ===================================================================

server:
  port: 8080

# ===================================================================
#  API 密钥
#  注意: DeepSeek 只支持对话，不支持 Embedding。
#  因此需要为 Embedding 额外配置一个支持 OpenAI 兼容 Embedding 的提供商。
#  如 OpenAI (text-embedding-3-small)、SiliconFlow、DashScope 等。
# ===================================================================
app:
  # DeepSeek Chat API 密钥（直接填写或设为环境变量 DEEPSEEK_API_KEY）
  chat-api-key: sk-eb3cf22084a7421e82066a2e1dbf2383
  # Embedding API 密钥（如使用同一密钥则无需修改）
  embedding-api-key: sk-uieyggtngtxjswureflwbfsyfrnllplbmsfwhvxybwrpeaea
  document-scan-path: data/docs          # 启动时自动扫描的文档目录

# ===================================================================
#  向量数据库配置（三选一）
#  通过 vector.store.type 切换
# ===================================================================
vector:
  store:
    type: in-memory    # 可选值: in-memory | chroma | milvus

# ----- InMemory（小项目/开发测试）-----
# 进程内内存存储，无需任何外部服务
# 应用重启后数据丢失，适合开发调试
# 无需额外配置

# ----- Chroma（中型项目）-----
chroma:
  host: localhost                         # Chroma 服务地址
  port: 8000                              # Chroma 服务端口
  collection-name: rag_demo               # 集合名称

# ----- Milvus（大型/生产）-----
milvus:
  host: localhost                         # Milvus 服务地址
  port: 19530                             # Milvus 服务端口
  collection-name: rag_demo               # 集合名称
  dimension: 1536                         # 向量维度（需与 embedding 模型匹配）

# ===================================================================
#  DeepSeek 对话模型（通过 OpenAI 兼容接口调用）
#  ✅ DeepSeek 对话 API 正常
#
#  模型说明：
#    deepseek-v4-pro    旗舰版，1.6T 总参/49B 激活，质量最高
#    deepseek-v4-flash  快速版，284B 总参/13B 激活（推荐，兼顾速度与质量）
#    deepseek-chat      ⚠ 2026-07-24 起废弃，当前映射到 v4-flash
#
#  推荐参数：
#    temperature: 1.0  （DeepSeek 官方默认值）
#    context: 1M tokens
# ===================================================================
langchain4j:
  open-ai:
    chat-model:
      api-key: ${app.chat-api-key}
      base-url: https://api.deepseek.com
      model-name: deepseek-v4-flash
      temperature: 1.0                    # DeepSeek 推荐值（0-2）

# ===================================================================
#  Embedding 模型（OpenAI 兼容接口）
#  ⚠ DeepSeek 不提供 Embedding API！
#  请将以下配置指向支持 Embedding 的服务：
#
#  推荐服务：
#    SiliconFlow（免费额度）:
#      base-url: https://api.siliconflow.cn/v1
#      model: BAAI/bge-large-zh-v1.5
#
#    OpenAI:
#      base-url: https://api.openai.com/v1
#      model: text-embedding-3-small
#
#    DashScope（阿里云）:
#      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
#      model: text-embedding-v1
# ===================================================================
    embedding-model:
      api-key: ${app.embedding-api-key}
      # ↓ 请替换为实际支持 Embedding 的服务地址
      base-url: https://api.siliconflow.cn/v1
      # ↓ 请替换为实际的 embedding 模型名
      model-name: BAAI/bge-large-zh-v1.5

# ===================================================================
#  文件上传限制
# ===================================================================
spring:
  servlet:
    multipart:
      max-file-size: 50MB                 # 单文件最大体积
      max-request-size: 50MB              # 单次请求最大体积
